<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" role="img" aria-label="Ilustrasi layanan warga RT: pendataan, surat pengantar, lacak permohonan">
  <defs>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ecfdf5"/>
      <stop offset="55%" stop-color="#d1fae5"/>
      <stop offset="100%" stop-color="#a7f3d0"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0fdf4"/>
    </linearGradient>
  </defs>
  <rect width="720" height="320" rx="16" fill="url(#heroBg)"/>

  <!-- Card 1: Pendataan -->
  <g transform="translate(40,48)">
    <rect width="200" height="200" rx="12" fill="url(#cardBg)" stroke="#86d4b0" stroke-width="2"/>
    <rect x="24" y="28" width="152" height="100" rx="8" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1.5"/>
    <circle cx="56" cy="62" r="14" fill="#047857"/>
    <path d="M48 78h16v8H48z" fill="#059669"/>
    <path d="M88 52h72M88 68h56M88 84h64M88 100h40" stroke="#6ee7b7" stroke-width="4" stroke-linecap="round"/>
    <rect x="24" y="148" width="152" height="28" rx="6" fill="#047857"/>
    <text x="100" y="188" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="13" font-weight="700" fill="#065f46">Pendataan warga</text>
  </g>

  <!-- Card 2: Surat pengantar -->
  <g transform="translate(260,48)">
    <rect width="200" height="200" rx="12" fill="url(#cardBg)" stroke="#86d4b0" stroke-width="2"/>
    <rect x="52" y="32" width="96" height="120" rx="4" fill="#fff" stroke="#047857" stroke-width="2"/>
    <path d="M68 56h64M68 72h48M68 88h56M68 104h40" stroke="#a7f3d0" stroke-width="3" stroke-linecap="round"/>
    <circle cx="128" cy="128" r="22" fill="none" stroke="#047857" stroke-width="3"/>
    <path d="M118 128l6 6 14-16" fill="none" stroke="#059669" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="24" y="148" width="152" height="28" rx="6" fill="#047857"/>
    <text x="100" y="188" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="13" font-weight="700" fill="#065f46">Surat pengantar RT</text>
  </g>

  <!-- Card 3: Lacak -->
  <g transform="translate(480,48)">
    <rect width="200" height="200" rx="12" fill="url(#cardBg)" stroke="#86d4b0" stroke-width="2"/>
    <rect x="28" y="40" width="144" height="88" rx="8" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1.5"/>
    <text x="100" y="78" text-anchor="middle" font-family="ui-monospace,monospace" font-size="18" font-weight="700" fill="#047857">LW-2026</text>
    <text x="100" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Nomor permohonan</text>
    <circle cx="100" cy="128" r="18" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
    <path d="M92 128l6 6 12-14" fill="none" stroke="#047857" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="24" y="148" width="152" height="28" rx="6" fill="#047857"/>
    <text x="100" y="188" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="13" font-weight="700" fill="#065f46">Lacak permohonan</text>
  </g>

  <text x="360" y="292" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="16" font-weight="600" fill="#065f46">Layanan Warga RT  Kelurahan Inauga</text>
</svg>
