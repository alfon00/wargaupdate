server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name wa.layananwarga.my.id;

    ssl_certificate /etc/letsencrypt/live/layananwarga.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/layananwarga.my.id/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000" always;

    client_max_body_size 100M;

    # API WAHA — dilindungi X-Api-Key WAHA (Laravel internal: http://waha:3000)
    location /api/ {
        proxy_pass http://waha:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location / {
        proxy_pass http://waha:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    # Perbaiki dashboard: set koneksi lokal (bukan worker eksternal) + API key benar
    location = /fix-waha-dashboard {
        default_type text/html;
        alias /etc/nginx/waha-dashboard-init.html;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name wa.layananwarga.my.id;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}
