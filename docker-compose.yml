name: layananwarga

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: container-laravel
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - node_modules:/var/www/html/node_modules
    environment:
      APP_URL: https://layananwarga.my.id
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - layananwarga

  nginx:
    image: nginx:1.27-alpine
    container_name: layananwarga-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www/html:ro
      - ./certbot/www:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./docker/nginx/ssl-layananwarga.conf:/etc/nginx/conf.d/ssl-layananwarga.conf:ro
      - ./docker/nginx/ssl-waha.conf:/etc/nginx/conf.d/ssl-waha.conf:ro
      - ./docker/nginx/waha-dashboard-init.html:/etc/nginx/waha-dashboard-init.html:ro
    depends_on:
      - app
      - waha
    networks:
      - layananwarga

  waha:
    image: devlikeapro/waha:latest
    container_name: container-whatsapp
    restart: unless-stopped
    env_file:
      - ./waha/.env
    volumes:
      - ./waha/sessions:/app/.sessions
      - ./waha/media:/app/.media
    dns:
      - 1.1.1.1
      - 8.8.8.8
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: "10"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3000/ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - layananwarga

  waha-bootstrap:
    image: curlimages/curl:8.12.1
    restart: "no"
    depends_on:
      waha:
        condition: service_healthy
    env_file:
      - ./waha/.env
    environment:
      WAHA_INTERNAL_URL: http://waha:3000
      WAHA_SESSION: default
    volumes:
      - ./docker/waha/bootstrap-session.sh:/bootstrap.sh:ro
    entrypoint: ["/bin/sh", "/bootstrap.sh"]
    networks:
      - layananwarga

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: layananwarga-queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - ./:/var/www/html
      - node_modules:/var/www/html/node_modules
    depends_on:
      mysql:
        condition: service_healthy
      waha:
        condition: service_started
    networks:
      - layananwarga

  mysql:
    image: mysql:latest
    container_name: container-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel_secret
      MYSQL_ROOT_PASSWORD: root_secret_change_me
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot_secret_change_me"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - layananwarga

volumes:
  mysql_data:
  node_modules:

networks:
  layananwarga:
    driver: bridge
